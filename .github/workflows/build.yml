name: build-and-deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 20 * * *" # 02:00 IST daily — refreshes day-counts baked into OG images
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Generate site
        run: go run .
        env:
          BASE_URL: https://innu-eshtu-dina.pages.dev

      # One-time setup:
      #   1. Create a Cloudflare Pages project named "innu-eshtu-dina" (direct upload).
      #   2. Add repo secrets CLOUDFLARE_API_TOKEN (Pages:Edit) and CLOUDFLARE_ACCOUNT_ID.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=innu-eshtu-dina
