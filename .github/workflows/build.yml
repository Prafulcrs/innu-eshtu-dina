name: daily-refresh

# Vercel's git integration deploys on every push to main.
# This workflow exists only to trigger a fresh build once a day,
# so the day-counts baked into OG share images stay current.
#
# One-time setup:
#   1. Import the GitHub repo at vercel.com/new (framework: Other).
#   2. Vercel project → Settings → Git → Deploy Hooks → create one for main.
#   3. Add the hook URL as repo secret VERCEL_DEPLOY_HOOK.

on:
  schedule:
    - cron: "30 20 * * *" # 02:00 IST
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        run: curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
