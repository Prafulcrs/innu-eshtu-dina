id: tunnel-road
name: Hebbal–Silk Board Tunnel Road
agency: B-SMILE / Govt of Karnataka
status: watching
started: "2023-12-01"
started_approx: true
location: { lat: 13.0358, lng: 77.5970 }
promised: []
cost_sanctioned_cr: 17698
summary: >-
  A 16.75 km twin-tube tunnel promised to cut the Hebbal–Silk Board
  commute from 90 minutes to 35. The lone L1 bid came in at ₹22,267
  crore — about ₹4,600 crore above the government's own estimate — and
  the decision has been stuck at cabinet level. No completion date for
  the full tunnel has ever been promised. The clock is running.
notes:
  - Tendered by B-SMILE (Bengaluru Smart Infrastructure Ltd) against a
    ₹17,698 crore estimate; the Adani Group emerged lowest bidder at
    ₹22,267 crore.
  - The cost escalation has left the bid decision pending at cabinet
    level as of May 2026.
  - A separate first phase — a 2.23 km, six-lane underground stretch from
    Hebbal Junction to the UAS staff quarters (₹1,139 crore) — got its
    foundation stone with an 18-month completion window.
  - The project's own detailed project report is public on Open City.
