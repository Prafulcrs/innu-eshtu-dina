id: metro-pink-line
name: Namma Metro Pink Line (Kalena Agrahara–Nagawara)
agency: BMRCL
status: crawling
started: "2017-01-01"
started_approx: true
location: { lat: 12.9698, lng: 77.6025 }
promised:
  - "2021-12-31"
  - "2026-12-31"
summary: >-
  A 21.4 km, 18-station Phase-2 line — Bengaluru's first major underground
  stretch — under construction since 2017. Originally part of Phase 2
  targets around 2021; now expected to open in stages through late 2026
  at the earliest.
notes:
  - The elevated southern section (about 7.5 km, Kalena Agrahara to
    Tavarekere) was expected around May 2026.
  - The 13.8 km underground stretch (Dairy Circle to Nagawara) is planned
    for late 2026, after tunnelling, systems integration and safety
    approvals.
  - First rolling stock for the line was still awaited as of 2025.
  - Deadlines for the line have been revised repeatedly across Phase 2's
    history.
