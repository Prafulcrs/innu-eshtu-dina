summary: >-
  In September 2025 the government promised a pothole-free Bengaluru,
  with the Chief Minister setting a September deadline across the five
  corporations and the Deputy CM setting November for contractors. An
  additional "fill every pothole in one week" ultimatum came on
  21 October. The roads answered for themselves.
notes:
  - The Chief Minister set the pothole-repair deadline across the five
    corporation limits for September 2025; deadline dates here are
    end-of-month approximations of stated targets.
  - On 21 October 2025, with roads still riddled, the CM ordered all
    potholes filled within a week amid a public spat with industrialists.
  - The Deputy CM set November 2025 as the contractors' deadline and said
    over 10,000 potholes had been filled.
  - Reports through the period documented potholes from Kengeri and
    Kanakapura Road to Koramangala, HSR Layout, Bellandur, Electronic City
    and Sarjapur.
