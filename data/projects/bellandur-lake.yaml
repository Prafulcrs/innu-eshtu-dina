summary: >-
  Bengaluru's largest lake (890 acres) — infamous for toxic froth and for
  catching fire — was ordered cleaned up by the National Green Tribunal,
  with desilting and rejuvenation to finish by early 2020. Six years past
  that order, desilting is still incomplete.
notes:
  - The NGT directed completion of desilting and rejuvenation by early
    2020, later extended to 2021.
  - The state approved ₹80 crore in 2025 to resume stalled desilting work.
  - The latest official deadline of March 2026 has passed with waterlogged
    conditions, slow desilting and funding delays cited.
  - Desilting of the 890-acre lakebed remains the project's biggest
    challenge.
