id: sky-deck
name: Bengaluru Sky Deck (250 m observation tower)
agency: BDA / Govt of Karnataka
status: stalled
started: "2023-07-01"
started_approx: true
location: { lat: 12.9060, lng: 77.4750 }
promised: []
cost_sanctioned_cr: 500
summary: >-
  A 250-metre observation tower announced in 2023 as South Asia's tallest
  sky deck, estimated at ₹500 crore and needing 25 acres. Three years on,
  the project is still hunting for a site — no land finalised, no
  construction started, and no completion date ever promised.
notes:
  - Announced as part of the "Brand Bengaluru" push with a ₹500 crore
    estimate.
  - The original Hemmigepura site was dropped — structures that tall are not
    permitted within a 20 km radius of the airport, and the land belonged to
    NICE.
  - Relocated near NICE Road on the city's outskirts in 2025 after
    opposition leaders and Bengaluru MLAs signed off on the new site.
