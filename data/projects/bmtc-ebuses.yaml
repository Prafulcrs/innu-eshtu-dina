id: bmtc-ebuses
kind: promise
name: 4,500 electric buses for BMTC (PM E-DRIVE)
agency: BMTC / Govt of Karnataka
status: stalled
started: "2025-12-01"
started_approx: true
promised:
  - "2026-01-31"
summary: >-
  4,500 electric buses were sanctioned for Bengaluru under the PM E-DRIVE
  scheme — the Centre finished the tender in December 2025, and rules
  required BMTC's work order within four weeks. The work order still
  hasn't been issued, stalling ₹1,505 crore in incentives earmarked for
  Karnataka, while BMTC's diesel fleet ages.
notes:
  - The Centre completed the tender process for the 4,500 buses in
    December 2025; the work order was due within four weeks of the demand
    confirmation letter (deadline date here is an approximation of that
    window).
  - BMTC has not issued the work order, citing pending State Cabinet
    approval.
  - The Ministry of Heavy Industries wrote to the Karnataka government
    flagging the delay; ₹1,505 crore in PM E-DRIVE incentives remain on
    hold.
  - Six other states have queued up asking for the buses Karnataka hasn't
    claimed.
