id: peripheral-ring-road
name: Peripheral Ring Road (Bengaluru Business Corridor)
agency: BDA
status: stalled
started: "2007-01-01"
started_approx: true
location: { lat: 13.1350, lng: 77.6050 }
promised:
  - "2027-12-31"
summary: >-
  An 8-lane, 73.5 km expressway meant to bypass the Outer Ring Road,
  first notified in 2007. Nearly two decades later, construction has not
  started. Revived in 2022 and rebranded the "Bengaluru Business Corridor"
  in 2024.
notes:
  - Land notifications issued since 2007 had yielded just 3.21 acres.
  - In 2025 the state empowered BDA to offer revised compensation on 948
    acres — about half the land the project needs.
  - Cabinet approved higher payouts in January 2026; by early 2026 over 600
    landowners had consented to options like 2–3x guidance value cash, TDR,
    or enhanced FAR.
  - Phase 1 is now targeted for mid-2027, with a stated full deadline of
    December 2027. Protests over denotification demands continue.
sources:
  - title: "Peripheral Ring Road Bangalore — map, status and impact (TalkingLands)"
    url: https://www.talkinglands.com/blogs/purpose-of-peripheral-ring-road-in-bangalore
