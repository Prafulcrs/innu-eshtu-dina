id: ejipura-flyover
name: Ejipura–Kendriya Sadan Flyover
agency: BBMP / Greater Bengaluru Authority
status: resumed
started: "2017-05-01"
started_approx: true
promised:
  - "2019-05-01"
  - "2026-03-31"
  - "2026-06-30"
  - "2026-10-31"
cost_sanctioned_cr: 204
summary: >-
  A 2.5 km flyover on the Inner Ring Road between Ejipura junction and
  Kendriya Sadan, meant to unclog one of Koramangala's worst corridors.
  Work began in 2017 with roughly a two-year completion window.
notes:
  - Original contractor Simplex Infrastructures crawled for years and was
    terminated in 2022; the work was re-tendered to BSCPL in 2023.
  - The March 2026 and June 2026 deadlines were both missed, with pending
    structural work and land issues near St John's Hospital cited.
  - St John's Hospital agreed in February 2026 to allow use of its land for a
    portal frame; the Greater Bengaluru Authority now targets October 2026.
  - Residents' representatives have publicly warned that even the latest
    target may slip to Deepavali 2026.
