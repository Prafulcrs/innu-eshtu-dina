id: gba-2026-flyovers
kind: promise
name: GBA's "10 flyovers and underpasses ready in 2026"
agency: Greater Bengaluru Authority
status: watching
started: "2026-01-03"
promised:
  - "2026-12-31"
summary: >-
  In January 2026 the Greater Bengaluru Authority claimed 10 of the 12
  ongoing flyovers, bridges and underpasses in the city would be completed
  within 2026 — including projects started as early as 2020 that have
  already missed multiple deadlines. Logged the day it was said. The
  clock will tell.
notes:
  - Among the most delayed on the list are two grade separators on the
    RR Nagar–Kengeri Outer Ring Road — one across Ullal Main Road and one
    at the HMT Road pipeline junction.
  - Several projects on the list were initiated as early as 2020.
  - Commuters quoted in coverage were openly skeptical, citing years of
    announced-and-missed deadlines.
sources:
  - title: "GBA claims 10 major flyovers and underpasses to be ready in 2026 (News Karnataka, Jan 2026)"
