id: gruha-lakshmi-arrears
kind: promise
name: Gruha Lakshmi — the unpaid instalments
agency: Govt of Karnataka
status: crawling
started: "2023-08-01"
started_approx: true
promised:
  - "2025-02-28"
summary: >-
  The flagship guarantee promises ₹2,000 every month to 1.28 crore women
  across Karnataka, Bengaluru included. Instalments stopped arriving from
  February 2025 — roughly ₹5,000 crore in arrears — and by May 2026 the
  Karnataka High Court had issued notice to the state over the
  non-disbursement. The counter runs from the first unpaid instalment.
notes:
  - Beneficiaries reported receiving no instalments from February 2025
    through May 2026.
  - The two withheld instalments for February and March 2025 alone amount
    to about ₹5,000 crore across 1.28 crore beneficiaries.
  - The Karnataka High Court issued notice to the state government on
    21 May 2026 on a PIL seeking release of pending payments.
  - Funds were allocated in the state budget; coverage questions why the
    money hasn't reached beneficiary accounts.
